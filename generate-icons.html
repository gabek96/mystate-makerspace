<!DOCTYPE html>
<html>
<head><title>MyState Icon Generator</title></head>
<body style="background:#222;display:flex;flex-direction:column;align-items:center;gap:20px;padding:40px;font-family:sans-serif;color:#fff">
<h2>MyState App Icon Generator</h2>
<p>Right-click each canvas → "Save image as" to save the PNGs</p>

<div style="display:flex;gap:40px;align-items:flex-end">
  <div style="text-align:center">
    <canvas id="c512" width="512" height="512"></canvas>
    <p>icon-512.png</p>
  </div>
  <div style="text-align:center">
    <canvas id="c192" width="192" height="192"></canvas>
    <p>icon-192.png</p>
  </div>
</div>

<script>
function drawIcon(canvas) {
  const s = canvas.width;
  const ctx = canvas.getContext('2d');
  const u = s / 512; // unit scale

  // === Background: Cardinal gradient with subtle radial glow ===
  const bg = ctx.createLinearGradient(0, 0, s, s);
  bg.addColorStop(0, '#C8102E');
  bg.addColorStop(0.5, '#A00D24');
  bg.addColorStop(1, '#7A0A1C');
  ctx.fillStyle = bg;

  // Rounded rectangle (maskable safe zone)
  const r = 80 * u;
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.fill();

  // Radial glow from top-left
  const glow = ctx.createRadialGradient(s * 0.25, s * 0.2, 0, s * 0.25, s * 0.2, s * 0.7);
  glow.addColorStop(0, 'rgba(255,255,255,0.12)');
  glow.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = glow;
  ctx.fill();

  // === Gold accent stripe — diagonal ===
  ctx.save();
  ctx.clip(); // clip to rounded rect
  ctx.beginPath();
  const stripeW = 28 * u;
  ctx.moveTo(s * 0.72, 0);
  ctx.lineTo(s * 0.72 + stripeW, 0);
  ctx.lineTo(s * 0.28 + stripeW, s);
  ctx.lineTo(s * 0.28, s);
  ctx.closePath();
  const stripeGrad = ctx.createLinearGradient(s * 0.72, 0, s * 0.28, s);
  stripeGrad.addColorStop(0, 'rgba(241,190,72,0.25)');
  stripeGrad.addColorStop(0.5, 'rgba(241,190,72,0.15)');
  stripeGrad.addColorStop(1, 'rgba(241,190,72,0.25)');
  ctx.fillStyle = stripeGrad;
  ctx.fill();
  ctx.restore();

  // Re-clip for remaining draws
  ctx.save();
  ctx.beginPath();
  ctx.moveTo(r, 0);
  ctx.lineTo(s - r, 0);
  ctx.quadraticCurveTo(s, 0, s, r);
  ctx.lineTo(s, s - r);
  ctx.quadraticCurveTo(s, s, s - r, s);
  ctx.lineTo(r, s);
  ctx.quadraticCurveTo(0, s, 0, s - r);
  ctx.lineTo(0, r);
  ctx.quadraticCurveTo(0, 0, r, 0);
  ctx.closePath();
  ctx.clip();

  // === Campanile silhouette (stylized) ===
  const cx = s * 0.5;
  const towerW = 44 * u;
  const towerTop = s * 0.12;
  const towerBot = s * 0.62;
  const baseW = 60 * u;
  const baseBot = s * 0.68;

  ctx.fillStyle = 'rgba(255,255,255,0.92)';

  // Spire
  ctx.beginPath();
  ctx.moveTo(cx, towerTop - 20 * u);
  ctx.lineTo(cx - 3 * u, towerTop + 10 * u);
  ctx.lineTo(cx + 3 * u, towerTop + 10 * u);
  ctx.closePath();
  ctx.fill();

  // Spire pole
  ctx.fillRect(cx - 2 * u, towerTop - 20 * u, 4 * u, 10 * u);

  // Tower body
  ctx.beginPath();
  ctx.moveTo(cx - towerW / 2, towerTop + 10 * u);
  ctx.lineTo(cx + towerW / 2, towerTop + 10 * u);
  ctx.lineTo(cx + towerW / 2, towerBot);
  ctx.lineTo(cx - towerW / 2, towerBot);
  ctx.closePath();
  ctx.fill();

  // Tower windows (3 rows)
  ctx.fillStyle = 'rgba(200,16,46,0.6)';
  for (let row = 0; row < 3; row++) {
    const wy = towerTop + 40 * u + row * 50 * u;
    ctx.fillRect(cx - 12 * u, wy, 8 * u, 18 * u);
    ctx.fillRect(cx + 4 * u, wy, 8 * u, 18 * u);
  }

  // Tower base/pedestal
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.beginPath();
  ctx.moveTo(cx - baseW / 2, towerBot);
  ctx.lineTo(cx + baseW / 2, towerBot);
  ctx.lineTo(cx + baseW / 2 + 8 * u, baseBot);
  ctx.lineTo(cx - baseW / 2 - 8 * u, baseBot);
  ctx.closePath();
  ctx.fill();

  // === "MY" text — bold, modern ===
  ctx.fillStyle = '#FFFFFF';
  ctx.font = `900 ${130 * u}px "Inter", "SF Pro Display", "Helvetica Neue", Arial, sans-serif`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('MY', cx, s * 0.88);

  // Gold underline accent
  const textW = ctx.measureText('MY').width;
  const lineGrad = ctx.createLinearGradient(cx - textW / 2, 0, cx + textW / 2, 0);
  lineGrad.addColorStop(0, '#F1BE48');
  lineGrad.addColorStop(0.5, '#FFD470');
  lineGrad.addColorStop(1, '#F1BE48');
  ctx.fillStyle = lineGrad;
  ctx.fillRect(cx - textW / 2, s * 0.90, textW, 6 * u);

  // === Subtle bottom shadow ===
  const botShadow = ctx.createLinearGradient(0, s * 0.85, 0, s);
  botShadow.addColorStop(0, 'rgba(0,0,0,0)');
  botShadow.addColorStop(1, 'rgba(0,0,0,0.15)');
  ctx.fillStyle = botShadow;
  ctx.fillRect(0, s * 0.85, s, s * 0.15);

  ctx.restore();
}

drawIcon(document.getElementById('c512'));
drawIcon(document.getElementById('c192'));
</script>
</body>
</html>
